schema_version: 1

context:
  name: deepgram-sdk
  version: "7.0.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name | replace('-', '_') }}-${{ version }}.tar.gz
  sha256: d114bf4859ec295633b0e3374b8c04e096a104ac58dd8533dd5e12c8a93ed788

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - poetry-core
  run:
    - python >=${{ python_min }}
    - httpx >=0.21.2
    - pydantic >=1.9.2
    - pydantic-core >=2.18.2,<2.44.0
    - typing_extensions >=4.0.0
    - websockets >=12.0
tests:
  - python:
      imports:
        - deepgram
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Python SDK for the Deepgram automated speech recognition platform.
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/deepgram/python-sdk
  documentation: https://developers.deepgram.com/

extra:
  recipe-maintainers:
    - thewchan
